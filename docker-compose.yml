version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tracechain
      POSTGRES_USER: tracechain
      POSTGRES_PASSWORD: tracechain_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracechain"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      # Dev-only placeholders — real deployments must inject their own via
      # secrets/env, never commit an actual value here.
      JWT_SECRET: dev-only-jwt-secret-do-not-use-in-production
      LEDGER_SIGNING_KEY: dev-only-ledger-signing-key-do-not-use-in-production
      DATABASE_URL: postgres://tracechain:tracechain_dev@postgres:5432/tracechain
      NODE_ENV: development
      PUBLIC_ORIGIN: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./backend/src
          target: /app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    # No VITE_API_URL here: Vite bakes import.meta.env.VITE_* in at BUILD time,
    # so a runtime container env var would silently do nothing. The frontend
    # calls same-origin '/api' and '/socket.io', which nginx.conf reverse-proxies
    # to the backend service — see nginx.conf.

volumes:
  postgres_data:
